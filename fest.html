<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Fallback redirect if JavaScript is disabled (3 seconds) -->
    <meta http-equiv="refresh" content="3;url=https://www.eventbrite.com/e/healing-arts-festival-2026-tickets-1994097209433">
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        .message {
            font-size: 1rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="message">Loading...</div>

    <script>
        // Replace this with your actual target URL
        const targetUrl = "https://www.eventbrite.com/e/healing-arts-festival-2026-tickets-1994097209433";

        // Wait 3000 milliseconds (3 seconds) before executing the redirect
        setTimeout(function() {
            window.location.href = targetUrl;
        }, 3000);
    </script>
    
</body>
</html>
